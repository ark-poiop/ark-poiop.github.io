<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    body { font-family: sans-serif; display: flex; margin: 0; }
    nav { width: 200px; background: #222; color: white; padding: 1rem; height: 100vh; }
    nav h2 { color: #fff; }
    nav a { display: block; margin: 0.5rem 0; color: #ccc; text-decoration: none; }
    nav a:hover { color: white; }
    main { padding: 2rem; flex-grow: 1; }
  </style>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-32K20B5DYB"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-32K20B5DYB');
</script>
</head>
<body>
  <nav>
    <h2><a href="{{ '/' | relative_url }}" style="color: inherit; text-decoration: none;">{{ site.title }}</a></h2>
    <p>{{ site.description }}</p>
    {% for item in site.data.navigation.main %}
      <a href="{{ item.url }}">{{ item.title }}</a>
    {% endfor %}
  </nav>
  <main>
    <h1>{{ page.title }}</h1>
    {{ content }}
  </main>
</body>
</html>
