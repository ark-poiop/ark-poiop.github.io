title: "포이옵의 블로그"
description: "Minimal Mistakes 스타일 블로그 (로컬 테마)"
url: "https://ark-poiop.github.io"
baseurl: ""

theme: null
minimal_mistakes_skin: "default"
locale: "ko-KR"

show_sidebar_nav: true

plugins:
  - jekyll-paginate
  - jekyll-seo-tag

paginate: 5
paginate_path: /page:num/

author:
  name: "포이옵"
  avatar: "/assets/images/profile.png"
  bio: "기록하고 공유하는 사람입니다."

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: single
      author_profile: true