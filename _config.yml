title: "Ark-poiop Blog"
description: "Minimal Mistakes 스타일 블로그"
url: "https://ark-poiop.github.io"
baseurl: ""

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"
locale: "ko-KR"

show_sidebar_nav: true 

plugins:
  - jekyll-remote-theme
  - jekyll-paginate

paginate: 5
paginate_path: /page:num/

author:
  name: "포이옵"
  avatar: "/assets/images/profile.png"
  bio: "기록하고 공유하는 사람입니다."

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: single
      author_profile: true
